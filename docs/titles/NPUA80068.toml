[title]
content_id = "NPUA80068"
short_name = "sshd"
display_name = "Super Stardust HD"
eboot_candidates = ["EBOOT.BIN", "EBOOT.elf"]
year = 2007
developer = "Housemarque"
engine = "Housemarque proprietary"
distribution = "psn-hdd"

[checkpoint]
# SSHD's attract-mode loop never exits on its own; the first PPU
# write to the RSX region (0xC0000000+) is the earliest
# deterministic stopping point both runners reach.
kind = "first-rsx-write"
