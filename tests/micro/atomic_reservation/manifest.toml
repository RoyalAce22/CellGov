[test]
name = "atomic_reservation"

# No [cellgov] section -- there is no CellGov scenario that matches
# "SPU atomic getllar/putllc."  Classified as Unsupported on the
# CellGov side.

[rpcs3]
binary = "build/atomic_reservation.elf"
decoder = "interpreter"
timeout_ms = 10000

[observe]
# 16-byte header (status + atomic_stat + pad) + 128-byte data copy
memory_regions = [
  { name = "header", addr = 0, size = 8 },
  { name = "data", addr = 16, size = 128 },
]

[expect]
outcome = "completed"
