[test]
name = "dma_completion"

[rpcs3]
binary = "build/dma_completion.elf"
decoder = "interpreter"
timeout_ms = 10000

[observe]
# 16-byte header (status + pattern_size + pad) + 128-byte pattern
memory_regions = [
  { name = "header", addr = 0, size = 8 },
  { name = "pattern", addr = 16, size = 128 },
]

[expect]
outcome = "completed"
