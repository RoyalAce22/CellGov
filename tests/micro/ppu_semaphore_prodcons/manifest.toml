[test]
name = "ppu_semaphore_prodcons"

# Structural microtest. Producer-consumer bounded buffer
# protected by two counting semaphores. Producer posts 32
# messages through a 4-slot circular buffer; consumer reads and
# sums. Final sum must equal 0 + 1 + ... + 31 = 496 with zero
# wait/post errors.

[rpcs3]
binary = "build/ppu_semaphore_prodcons.elf"
decoder = "interpreter"
timeout_ms = 10000

[observe]
# TestResult: status + sum + producer_errs + consumer_errs
memory_regions = [
  { name = "result", addr = 0, size = 16 },
]

[expect]
outcome = "completed"

# Usage:
#   1. Build:
#        docker run --rm \
#          -v "$(pwd)/tests/micro/ppu_semaphore_prodcons:/src" \
#          -v "$(pwd)/tests/micro/common:/common" \
#          -e COMMON=/common ps3dev-fresh:latest bash /src/build.sh
#
#   2. Stage:
#        mkdir -p tools/rpcs3/dev_hdd0/game/CG_SEM/USRDIR
#        cp tests/micro/ppu_semaphore_prodcons/build/\
#           ppu_semaphore_prodcons.elf \
#           tools/rpcs3/dev_hdd0/game/CG_SEM/USRDIR/EBOOT.elf
#
#   3. Run:
#        cargo run --release -p cellgov_cli -- run-game \
#          --title-manifest tests/micro/ppu_semaphore_prodcons/\
# manifest.toml --max-steps 10000000

[cellgov.title]
content_id = "CG_SEM"
short_name = "sem"
display_name = "CellGov semaphore producer-consumer microtest"
eboot_candidates = ["EBOOT.elf"]

[cellgov.checkpoint]
kind = "process-exit"
